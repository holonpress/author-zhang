# The Site Configuration for Chirpy
# For more details, visit: https://chirpy.cotes.page/posts/getting-started/

lang: zh-CN
timezone: Asia/Tokyo
title: 张三
tagline: 一个持续的公共写作者
description: >-
  思考这个时代的结构里公共如何可能，个体如何构筑自我。
url: "https://holonpress.github.io"
baseurl: "/author-zhang"

github:
  username: holonpress

theme: jekyll-theme-chirpy

avatar: /assets/img/avatars/default.png

social:
  name: 张三
  links:
    - https://github.com/holonpress/author-zhang

# ── 文章 permalink ──
permalink: /posts/:title/

# ── 分页 ──
paginate: 10

# ── 语法高亮 ──
markdown: kramdown
highlighter: rouge
kramdown:
  syntax_highlighter: rouge

# ── Tab 集合 ──
collections:
  tabs:
    output: true
    sort_by: order

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      permalink: /posts/:title/
      authors: [张三]
  - scope:
      path: _tabs
    values:
      layout: page

# ── 排除（不公开的 agent 文件）──
exclude:
  - Gemfile
  - Gemfile.lock
  - vendor
  - README.md
  - memory/
  - knowledge/
  - skills/
  - articles/
  - _drafts/
  - _research/
  - AGENTS.md
  - .github/
  - .gitignore
