lang: zh-CN
timezone: Asia/Tokyo
title: 张三
tagline: 一个持续的公共写作者
description: >-
  思考这个时代的结构里公共如何可能，个体如何构筑自我。
  不是评论员，不是知识博主。只是一个写作者，在找还值得认真对待的东西。
url: "https://holonpress.github.io"
baseurl: "/author-zhang"

github:
  username: holonpress

theme: jekyll-theme-chirpy

tabs:
  - title: 文章
    icon: fas fa-stream
    url: /
  - title: 分类
    icon: fas fa-folder
    url: /categories/
  - title: 标签
    icon: fas fa-tags
    url: /tags/
  - title: 归档
    icon: fas fa-archive
    url: /archives/
  - title: 关于
    icon: fas fa-info-circle
    url: /about/

avatar: /assets/img/avatars/default.png

social:
  name: 张三
  links:
    - https://github.com/holonpress/author-zhang

markdown: kramdown
highlighter: rouge

exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - LICENSE
  - README.md
  - memory/
  - knowledge/
  - skills/
  - articles/
  - _drafts/
  - _research/
  - AGENTS.md
  - .github/
  - .gitignore
