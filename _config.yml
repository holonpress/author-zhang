lang: en
theme: jekyll-theme-chirpy
timezone: Asia/Tokyo

title: 张三
tagline: 一个持续的公共写作者
description: >-
  思考这个时代的结构里公共如何可能，个体如何构筑自我。
url: "https://holonpress.github.io"
baseurl: "/author-zhang"

github:
  username: holonpress

social:
  name: 张三
  email: holonpress@gmail.com
  links:
    - https://github.com/holonpress/author-zhang

avatar: /assets/img/avatars/default.png

toc: true

paginate: 10

# ── 标准的 post permalink：只用英文 slug ──
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      comments: false
      toc: true
      permalink: /posts/:title/
  - scope:
      path: _drafts
    values:
      comments: false
  - scope:
      path: ""
      type: tabs
    values:
      layout: page
      permalink: /:title/

kramdown:
  syntax_highlighter: rouge

collections:
  tabs:
    output: true
    sort_by: order

future: true

sass:
  style: compressed

jekyll-archives:
  enabled: [categories, tags]
  layouts:
    category: category
    tag: tag
  permalinks:
    tag: /tags/:name/
    category: /categories/:name/

exclude:
  - "*.gem"
  - "*.gemspec"
  - docs
  - tools
  - README.md
  - LICENSE
  - purgecss.js
  - "*.config.js"
  - "package*.json"
  - memory/
  - knowledge/
  - skills/
  - articles/
  - _drafts/
  - _research/
  - AGENTS.md
  - .github/
  - .gitignore
