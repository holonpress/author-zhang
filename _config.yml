# Chirpy Blog Configuration
lang: zh-CN
timezone: Asia/Tokyo
title: 张三
tagline: 一个持续的公共写作者
description: >-
  思考这个时代的结构里公共如何可能，个体如何构筑自我。
  不是评论员，不是知识博主。只是一个写作者，在找还值得认真对待的东西。
url: "https://holonpress.github.io"
baseurl: "/author-zhang"

github:
  username: holonpress

# Theme
theme: jekyll-theme-chirpy

# Navigation tabs
tabs:
  - title: 文章
    icon: fas fa-stream
    url: /
  - title: 分类
    icon: fas fa-folder
    url: /categories/
  - title: 标签
    icon: fas fa-tags
    url: /tags/
  - title: 归档
    icon: fas fa-archive
    url: /archives/
  - title: 关于
    icon: fas fa-info-circle
    url: /about/

# Post settings
paginate: 10
permalink: /posts/:title/

# Avatar
avatar: /assets/img/avatars/default.png

# Social
social:
  name: 张三
  links:
    - https://github.com/holonpress/author-zhang

# Build
markdown: kramdown
highlighter: rouge

# Exclude
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - LICENSE
  - README.md
  - memory/
  - knowledge/
  - skills/
  - articles/
  - _drafts/
  - _research/

# Pagination
pagination:
  enabled: true
  per_page: 10
  permalink: '/page/:num/'
  title: ':title - 第 :num 页'
  limit: 0
  sort_field: 'date'
  sort_reverse: true
